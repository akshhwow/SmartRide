# ============================================================
#   SMART RIDE SHARING SYSTEM - Application Configuration
# ============================================================
# ? This file contains all settings for your Spring Boot app.
#    Think of it like a settings/config file for the whole app.
# ============================================================

# --- Server Configuration ---
# This sets the port your backend will run on (default is 8080)
server.port=8080

# --- Database Configuration ---
# Replace 'smartride_db' with your MySQL database name
# Replace 'root' with your MySQL username
# Replace 'yourpassword' with your MySQL password
spring.datasource.url=jdbc:mysql://localhost:3306/smartride_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
# 'update' means it will automatically create/update tables in your DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Email Configuration (Gmail SMTP) ---
# IMPORTANT: Use Gmail App Password, NOT your regular Gmail password
# Steps to get App Password:
#   1. Go to your Google Account ? Security
#   2. Enable 2-Step Verification
#   3. Search "App passwords" ? Create one for "Mail"
#   4. Copy the 16-character password and paste below
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=akkibunny27@gmail.com
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- JWT Configuration ---
# This is the secret key used to sign JWT tokens
# IMPORTANT: Change this to a long random string in production!
# The key must be at least 256 bits (32+ characters)
jwt.secret=SmartRideSecretKey2024ThisMustBeAtLeast256BitsLongForSecurity
# Token expiry time in milliseconds: 86400000 = 24 hours
jwt.expiration=86400000
# OTP expiry time in minutes
jwt.otp.expiry=10

# --- CORS Configuration ---
# This allows your React frontend (running on port 3000) to talk to this backend
app.cors.allowed-origins=http://localhost:3000

# --- Development Helpers ---
# Enable this to allow retrieving OTPs via /api/auth/dev-otp (useful when email can't send)
app.dev.allow-otp-retrieval=false

# For local development: disable the email verification requirement so you can log in without an email OTP
# (set to true in production to require email verification)
app.auth.require-email-verification=true

# --- Razorpay Configuration ---
# Get these from your Razorpay Dashboard (Test or Live)
razorpay.key-id=rzp_test_SN7sEcagRzBQAG
razorpay.key-secret=y3zllLtRXcf8IN2GypW7vGz8
razorpay.currency=INR

# Driver share percentage of total fare (e.g. 0.7 = 70% goes to driver)
app.payment.driver-share=0.7

# --- Application Name ---
spring.application.name=SmartRide Backend

