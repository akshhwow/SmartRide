<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/car-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartRide - Ride Sharing Platform</title>
    <!-- Polyfill for SockJS which requires a 'global' variable commonly injected by Webpack but missing in Vite -->
    <script>
      if (typeof global === 'undefined') {
        window.global = window;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Razorpay Checkout script (required for in-browser payments) -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
